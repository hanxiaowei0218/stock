name: A股模拟交易调度

on:
  schedule:
    # GitHub Actions 用 UTC 时间；北京时间 = UTC+8
    # A股交易时段 9:30-11:30 / 13:00-15:00 → UTC 1:30-3:30 / 5:00-7:00
    # 盘中每30分钟触发（免费版调度可能有几分钟延迟，属正常现象）
    - cron: '0,30 1-3 * * 1-5'
    - cron: '0,30 5-6 * * 1-5'
    - cron: '0 7 * * 1-5'
  workflow_dispatch:        # 允许在 Actions 页面手动触发

# 允许工作流回写数据文件到仓库
permissions:
  contents: write

concurrency:
  group: trade-run
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行一轮交易决策
        run: python main.py
        env:
          TZ: Asia/Shanghai

      - name: 提交交易数据与仪表盘
        run: |
          git config user.name  "trade-bot"
          git config user.email "trade-bot@users.noreply.github.com"
          git add data/ dashboard/ || true
          if git diff --cached --quiet; then
            echo "无数据变化，跳过提交"
          else
            git commit -m "auto: 交易更新 $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
